<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Checklist - Clean Up Room</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Mynerve&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="mobile.css?v=20260425-2">
</head>
<body>
	<main class="phone-stage">
		<section class="note-wrapper" aria-label="Room clean-up checklist">
			<div class="tape"></div>
			<div class="note-sheet">
				<p class="note-title">To Do:</p>
				<p class="note-subtitle">clean the room</p>

				<div class="cl-session" id="sessionInfo" hidden>
					<span class="session-label">Session</span>
					<span class="session-id" id="sessionIdDisplay"></span>
				</div>

				<div class="cl-body">
					<ul class="checklist" id="checklist" aria-label="Room clean-up checklist"></ul>
				</div>

				<div class="cl-progress" id="progressBar">
					<div class="progress-track">
						<div class="progress-fill" id="progressFill"></div>
					</div>
					<p class="progress-label" id="progressLabel">0/8</p>
				</div>

				<div class="cl-status" id="statusBar" aria-live="polite">
					<span class="status-dot" id="statusDot"></span>
					<span class="status-text" id="statusText">connecting...</span>
				</div>

				<div class="cl-done" id="doneMessage" hidden>
					<p class="done-text">All cleaned up!</p>
				</div>
			</div>
		</section>
	</main>

	<script src="firebase-config.js"></script>
	<!-- Firebase SDK – wird nur aktiv, wenn firebase-config.js konfiguriert ist -->
	<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
	<script src="sync.js?v=20260425-2"></script>
	<script src="mobile.js?v=20260425-2"></script>
</body>
</html>
